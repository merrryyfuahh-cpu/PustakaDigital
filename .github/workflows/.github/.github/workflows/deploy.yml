name: Terapkan ke GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pasang pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Pasang Dependensi
        run: pnpm install

      - name: Rakit Proyek
        run: pnpm build

      - name: Unggah Hasil Rakitan
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Sebarkan ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
